<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page Not Found — Kdesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background:#0d0d1a; color:#e0e0e0; font-family:'Segoe UI',Calibri,Arial,sans-serif; }
    .error-icon { font-size:4rem; color:#8200B4; }
    .error-code { font-size:6rem; font-weight:700; color:#8200B4; line-height:1; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="text-center px-4">
    <div class="error-code">404</div>
    <i class="bi bi-search error-icon my-3 d-block"></i>
    <h2 class="mb-2">Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary">
      <i class="bi bi-house me-1"></i>Back to Dashboard
    </a>
  </div>
</body>
</html>
