<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kdesk – Signing in…</title>
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center;
         height: 100vh; background: #fff; font-family: "Segoe UI", sans-serif; color: #444; }
  .msg { text-align: center; max-width: 420px; padding: 0 24px; }
  .msg p { margin: 12px 0 0; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0;
             border-top-color: #6264a7; border-radius: 50%;
             animation: spin .8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn { display:none; margin-top:16px; padding:10px 24px; background:#6264a7;
         color:#fff; border:none; border-radius:6px; font-size:15px;
         font-family:inherit; cursor:pointer; }
  #err { display:none; color:#c00; margin-top:12px; font-size:13px; word-break:break-word; }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner" id="spinner"></div>
  <p id="status">Signing you in…</p>
  <p id="err"></p>
  <button class="btn" id="go-btn">Open Kdesk Portal</button>
</div>

<script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
<script>
{% load static %}
(function () {
  var CSRF = '{{ csrf_token }}';
  var PORTAL_URL = '{% url "portal_dashboard" %}';

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    setStatus('Sign-in failed');
    var el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showSuccess() {
    document.getElementById('spinner').style.display = 'none';
    setStatus('Signed in — opening portal…');
    var btn = document.getElementById('go-btn');
    btn.style.display = 'inline-block';
    btn.onclick = function () { window.location.href = PORTAL_URL; };
  }

  function doSSO(token) {
    fetch('{% url "portal_teams_sso" %}', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ token: token }),
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.ok) {
        showSuccess();
      } else {
        showError('SSO error: ' + (data.error || 'unknown') +
                  (data.detail ? ' — ' + data.detail : ''));
      }
    })
    .catch(function (e) { showError('Network error: ' + e); });
  }

  // Initialize Teams SDK
  microsoftTeams.app.initialize()
    .then(function () {
      setStatus('Getting Teams token…');
      // Promise-based getAuthToken (Teams JS SDK v2.x)
      return microsoftTeams.authentication.getAuthToken();
    })
    .then(function (token) {
      setStatus('Verifying identity…');
      doSSO(token);
    })
    .catch(function (err) {
      // getAuthToken failed — show the actual error, don't redirect blind
      var msg = (err && (err.message || err.errorCode || JSON.stringify(err))) || String(err);
      showError('Teams token error: ' + msg +
        ' — Make sure the app is configured in Teams Admin Center with webApplicationInfo.');
    });
})();
</script>
</body>
</html>
