name: Deploy Kdesk to Azure

# Continuous deployment: on every merge to main, run tests, build+push the image
# (tagged latest AND the commit SHA for rollback), then restart the Azure Web Apps.
# Requires repo secret AZURE_CREDENTIALS (see docs/superpowers/ci-cd-setup.md).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: kdeskregistry
  IMAGE_REPO: kdeskregistry.azurecr.io/kdesk
  RG: kdesk-prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: python manage.py test hibob_sync integrations.test_graph_reads tickets.test_broadcast_utils --settings=kdesk.settings_test

  deploy:
    needs: test
    # Dormant until you opt in: set repo variable DEPLOY_ENABLED=true (after the
    # AZURE_CREDENTIALS secret exists). Until then only the test job runs on merges,
    # so a missing secret never red-Xes main and the CD cutover stays deliberate.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "$REGISTRY"

      - name: Build image (latest + commit SHA)
        run: docker build -t "$IMAGE_REPO:latest" -t "$IMAGE_REPO:${{ github.sha }}" .

      - name: Push image
        run: |
          docker push "$IMAGE_REPO:latest"
          docker push "$IMAGE_REPO:${{ github.sha }}"

      - name: Point web apps at the new image
        run: |
          for APP in kdesk-web kdesk-celery kdesk-celery-beat; do
            az webapp config container set \
              --resource-group "$RG" --name "$APP" \
              --container-image-name "$IMAGE_REPO:latest" > /dev/null
          done

      - name: Restart web first (runs migrations), then workers
        run: |
          az webapp restart --resource-group "$RG" --name kdesk-web
          sleep 25
          az webapp restart --resource-group "$RG" --name kdesk-celery
          az webapp restart --resource-group "$RG" --name kdesk-celery-beat

      - name: Verify services are Running
        run: |
          sleep 20
          fail=0
          for APP in kdesk-web kdesk-celery kdesk-celery-beat; do
            STATE=$(az webapp show --resource-group "$RG" --name "$APP" --query state -o tsv 2>/dev/null)
            echo "$APP: $STATE"
            if [ "$STATE" != "Running" ]; then
              az webapp start --resource-group "$RG" --name "$APP" || true
              sleep 10
              STATE=$(az webapp show --resource-group "$RG" --name "$APP" --query state -o tsv 2>/dev/null)
              [ "$STATE" = "Running" ] || fail=1
            fi
          done
          if [ "$fail" = "1" ]; then echo "::error::A service is not Running after deploy"; exit 1; fi
          echo "Done. Live at https://kdesk.kramerav.com"
