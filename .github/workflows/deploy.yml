name: Deploy Kdesk to Azure

# Continuous deployment: on every merge to main, build the image, push to ACR,
# and restart the three Azure Web Apps — the automated replacement for deploy.sh.
# This is what lets a fix be approved + merged from a phone and ship on its own.
#
# Requires one repo secret (see docs/superpowers/ci-cd-setup.md):
#   AZURE_CREDENTIALS — service-principal JSON from `az ad sp create-for-rbac --sdk-auth`,
#                       scoped to resource group kdesk-prod with AcrPush on kdeskregistry.

on:
  push:
    branches: [main]
  workflow_dispatch: {}          # allows a manual run from the Actions tab / GitHub mobile

concurrency:
  group: deploy-prod
  cancel-in-progress: false      # never interrupt an in-flight prod deploy

env:
  REGISTRY: kdeskregistry
  IMAGE: kdeskregistry.azurecr.io/kdesk:latest
  RG: kdesk-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "$REGISTRY"

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Point web apps at the new image and restart
        run: |
          for APP in kdesk-web kdesk-celery kdesk-celery-beat; do
            az webapp config container set \
              --resource-group "$RG" --name "$APP" \
              --container-image-name "$IMAGE" > /dev/null
            az webapp restart --resource-group "$RG" --name "$APP"
          done

      - name: Verify services are Running
        run: |
          sleep 30
          fail=0
          for APP in kdesk-web kdesk-celery kdesk-celery-beat; do
            STATE=$(az webapp show --resource-group "$RG" --name "$APP" --query state -o tsv 2>/dev/null)
            echo "$APP: $STATE"
            if [ "$STATE" != "Running" ]; then
              az webapp start --resource-group "$RG" --name "$APP" || true
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::warning::One or more services were not Running and were started — check logs."
          fi
          echo "Done. Live at https://kdesk.kramerav.com"
